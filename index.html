<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasbeeh Digital & Tracker</title>
    <link rel="icon" type="image/png" href="tasbeeh-js.png">
    <link rel="apple-touch-icon" href="tasbeeh-js.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tasbeeh.js">
    <meta name="theme-color" content="#1b4332">

    <style>
        :root {
            --primary-green: #1b4332;
            --light-sage: #95d5b2;
            --accent-gold: #ffeb3b;
            --glass-bg: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #081c15 0%, #1b4332 50%, #2d6a4f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Agar bisa scroll kalau list panjang */
            color: white;
            padding: 40px 0;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 25px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 15px;
            color: white;
            text-align: center;
            font-family: 'Poppins';
            outline: none;
            margin-bottom: 20px;
        }

        #active-dzikir { color: var(--light-sage); margin-bottom: 15px; font-weight: 300; letter-spacing: 1px; }

        .counter-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            border: 3px solid var(--light-sage);
        }

        #counter { font-size: 4.5rem; font-weight: 600; }

        .btn-hit {
            width: 100%;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 20px;
            background: #d8f3dc;
            color: var(--primary-green);
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .btn-hit:active { transform: scale(0.95); }

        /* Section History */
        .history-container {
            margin-top: 30px;
            text-align: left;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .history-title { font-size: 0.9rem; color: var(--light-sage); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

        .history-item {
            background: rgba(255,255,255,0.05);
            padding: 10px 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease;
        }

        .history-info span { font-size: 0.85rem; color: var(--accent-gold); margin-left: 10px; }

        .btn-delete { background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 1rem; }

        .watermark { margin-top: 30px; font-size: 0.7rem; opacity: 0.5; }
        .watermark a { color: var(--light-sage); text-decoration: none; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <input type="text" id="dzikir-input" placeholder="Masukkan nama dzikir..." oninput="updateDzikirText()">
    
    <div id="active-dzikir">Mulai Dzikir</div>
    
    <div class="counter-wrapper">
        <div id="counter">0</div>
        <div style="position: absolute; bottom: 25px; font-size: 0.7rem; color: var(--accent-gold);">
            Target: <span id="target-display">33</span>
        </div>
    </div>
    
    <button class="btn-hit" onclick="increment()">HITUNG</button>
    
    <div style="display: flex; justify-content: space-between; margin-top: 20px;">
        <button onclick="reset()" style="background:#1b4332; border-radius:5px; border:#193f2e; color:white; font-size:0.8rem; cursor:pointer;">Reset Angka</button>
        <select id="set-target" onchange="changeTarget()" style="background:rgba(0,0,0,0.2); color:white; border:none; border-radius:5px;">
            <option value="33">Target 33</option>
            <option value="100">Target 100</option>
            <option value="1000">Target 1000</option>
        </select>
    </div>

    <div class="history-container">
        <div class="history-title">Riwayat Dzikir Kamu:</div>
        <div id="history-list">
            </div>
    </div>

    <div class="watermark">
        Developed by <a href="https://github.com/bukanwani68" target="_blank">@bukanwani68</a>
    </div>
</div>

<script>
    let count = 0;
    let target = 33;

    function updateDzikirText() {
        const input = document.getElementById('dzikir-input').value;
        document.getElementById('active-dzikir').innerText = input || "Mulai Dzikir";
    }

    function increment() {
        count++;
        document.getElementById('counter').innerText = count;
        
        if (navigator.vibrate) navigator.vibrate(40);

        if (count === target) {
            saveToHistory();
            alert("Target tercapai! Tersimpan di riwayat.");
            reset();
        }
    }

    function saveToHistory() {
        const dzikirName = document.getElementById('dzikir-input').value || "Dzikir Umum";
        const historyList = document.getElementById('history-list');
        
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `
            <div class="history-info">
                ✅ ${dzikirName} <span>(${target}x)</span>
            </div>
            <button class="btn-delete" onclick="this.parentElement.remove()">✕</button>
        `;
        
        historyList.prepend(item);
    }

    function reset() {
        count = 0;
        document.getElementById('counter').innerText = count;
    }

    function changeTarget() {
        target = parseInt(document.getElementById('set-target').value);
        document.getElementById('target-display').innerText = target;
        reset();
    }
</script>

</body>
</html>
